name: Cleanup GHCR v1.0.0

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/cleanup-ghcr-v100.yml"

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete stale v1.0.0 package version
        uses: actions/github-script@v7
        with:
          script: |
            const owner = "BillWang0101";
            const package_type = "container";
            const package_name = "lonicera";
            const staleTag = "v1.0.0";

            const versions = await github.paginate(
              github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
              {
                username: owner,
                package_type,
                package_name,
                per_page: 100,
              },
            );

            const staleVersions = versions.filter((version) => {
              const tags = version.metadata?.container?.tags || [];
              return tags.includes(staleTag);
            });

            core.info(`Found ${versions.length} package version(s).`);
            core.info(`Found ${staleVersions.length} stale ${staleTag} version(s).`);

            for (const version of staleVersions) {
              const tags = version.metadata?.container?.tags || [];
              core.info(`Deleting package version id=${version.id} tags=${tags.join(",")}`);
              await github.rest.packages.deletePackageVersionForUser({
                username: owner,
                package_type,
                package_name,
                package_version_id: version.id,
              });
            }
